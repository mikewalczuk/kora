collection:
  get:
    operationId: listNotes
    tags:
      - notes
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      "200":
        description: Paginated list of notes
        content:
          application/json:
            schema:
              $ref: '../components/schemas/ListNotesResponse.yaml'
      "401":
        $ref: '../components/responses/Unauthorized.yaml'
  post:
    operationId: createNote
    tags:
      - notes
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/CreateNoteRequest.yaml'
    responses:
      "201":
        description: Note created
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Note.yaml'
      "400":
        $ref: '../components/responses/BadRequest.yaml'
      "401":
        $ref: '../components/responses/Unauthorized.yaml'

single:
  get:
    operationId: getNote
    tags:
      - notes
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Note found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Note.yaml'
      "401":
        $ref: '../components/responses/Unauthorized.yaml'
      "404":
        $ref: '../components/responses/NotFound.yaml'
  patch:
    operationId: updateNote
    tags:
      - notes
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/UpdateNoteRequest.yaml'
    responses:
      "200":
        description: Note updated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Note.yaml'
      "400":
        $ref: '../components/responses/BadRequest.yaml'
      "401":
        $ref: '../components/responses/Unauthorized.yaml'
      "404":
        $ref: '../components/responses/NotFound.yaml'
  delete:
    operationId: deleteNote
    tags:
      - notes
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "204":
        description: Note deleted
      "401":
        $ref: '../components/responses/Unauthorized.yaml'
      "404":
        $ref: '../components/responses/NotFound.yaml'
