collection:
  get:
    operationId: listPractices
    tags:
      - practices
    parameters:
      - name: noteId
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: array
          items:
            type: string
            enum: [pending, in_progress, completed]
        style: form
        explode: false
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
    responses:
      "200":
        description: List of practices
        content:
          application/json:
            schema:
              $ref: '../components/schemas/ListPracticesResponse.yaml'
      "401":
        $ref: '../components/responses/Unauthorized.yaml'
  post:
    operationId: createPractice
    tags:
      - practices
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/CreatePracticeRequest.yaml'
    responses:
      "201":
        description: Practice accepted
        content:
          application/json:
            schema:
              $ref: '../components/schemas/CreatePracticeResponse.yaml'
      "400":
        $ref: '../components/responses/BadRequest.yaml'
      "401":
        $ref: '../components/responses/Unauthorized.yaml'
      "409":
        $ref: '../components/responses/Conflict.yaml'

exercise:
  patch:
    operationId: submitExercise
    tags:
      - practices
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: exerciseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/SubmitExerciseRequest.yaml'
    responses:
      "200":
        description: Exercise submitted
        content:
          application/json:
            schema:
              $ref: '../components/schemas/SubmitExerciseResponse.yaml'
      "400":
        $ref: '../components/responses/BadRequest.yaml'
      "401":
        $ref: '../components/responses/Unauthorized.yaml'
      "404":
        $ref: '../components/responses/NotFound.yaml'
      "409":
        description: Question already answered

single:
  get:
    operationId: getPractice
    tags:
      - practices
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Practice found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Practice.yaml'
      "401":
        $ref: '../components/responses/Unauthorized.yaml'
      "404":
        $ref: '../components/responses/NotFound.yaml'
