type: object
required: [id, question, options]
properties:
  id:
    type: string
    format: uuid
  question:
    type: string
  options:
    type: array
    items:
      type: object
      required: [id, text]
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
  submission:
    nullable: true
    type: object
    required: [type, selectedOptionId, correct]
    properties:
      type:
        type: string
        enum: [multi-quiz]
      selectedOptionId:
        type: string
        format: uuid
      correct:
        type: boolean
