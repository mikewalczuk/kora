version: "2"
sql:
  - schema: "migrations" # sqlc czyta Twoje pliki .sql od goose!
    queries: "internal/**/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: "database" # nazwa paczki w Go
        out: "internal/database" # gdzie trafi wygenerowany kod
        sql_package: "pgx/v5" # używamy nowoczesnego drivera pgx
        overrides:
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
